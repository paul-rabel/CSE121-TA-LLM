<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TAI Assistant</title>
    <style>
      :root {
        --bg-1: #020205;
        --bg-2: #050812;
        --bg-3: #090f1f;
        --bg-accent-1: rgba(34, 51, 109, 0.3);
        --bg-accent-2: rgba(40, 64, 145, 0.18);
        --grid-line: rgba(255, 255, 255, 0.015);
        --grid-opacity: 0.36;
        --panel: rgba(11, 15, 31, 0.76);
        --panel-border: rgba(144, 171, 255, 0.2);
        --console-shadow: 0 16px 42px rgba(3, 7, 20, 0.56);
        --text-main: #edf1ff;
        --text-muted: #9ca9c9;
        --orb-core-a: #ffd8ad;
        --orb-core-b: #ff946f;
        --orb-ring: rgba(255, 184, 121, 0.52);
        --ring-1-bright: rgba(255, 206, 150, 0.34);
        --ring-1-mid: rgba(255, 187, 127, 0.2);
        --ring-1-fade: rgba(255, 164, 107, 0.04);
        --ring-2-bright: rgba(255, 196, 139, 0.27);
        --ring-2-mid: rgba(255, 176, 117, 0.16);
        --ring-2-fade: rgba(255, 154, 96, 0.035);
        --ring-3-bright: rgba(255, 186, 128, 0.22);
        --ring-3-mid: rgba(255, 168, 109, 0.13);
        --ring-3-fade: rgba(255, 147, 91, 0.026);
        --ring-4-bright: rgba(255, 177, 118, 0.17);
        --ring-4-mid: rgba(255, 158, 101, 0.1);
        --ring-4-fade: rgba(255, 140, 84, 0.02);
        --user-msg: linear-gradient(145deg, rgba(86, 120, 230, 0.28), rgba(28, 45, 107, 0.42));
        --assistant-msg: linear-gradient(145deg, rgba(21, 28, 53, 0.82), rgba(12, 17, 35, 0.9));
        --msg-border: rgba(142, 168, 249, 0.24);
        --input-bg: rgba(7, 10, 23, 0.92);
        --input-border: rgba(138, 167, 255, 0.34);
        --placeholder: #8d9ec9;
        --source-text: #d9e5ff;
        --source-border: rgba(146, 173, 255, 0.34);
        --source-bg: rgba(35, 50, 107, 0.56);
        --form-border: rgba(146, 173, 255, 0.2);
        --status-color: #f1dac0;
        --status-shadow: rgba(233, 168, 118, 0.52);
        --button-a: #f0a86f;
        --button-b: #c46c4e;
        --button-text: #ecf2ff;
        --button-shadow: 0 8px 22px rgba(66, 103, 238, 0.44);
        --toggle-bg: rgba(10, 16, 34, 0.78);
        --toggle-border: rgba(146, 173, 255, 0.36);
        --toggle-text: #dbe7ff;
        --toggle-shadow: 0 10px 24px rgba(0, 0, 0, 0.3);
        --theme-speed: 420ms;
        --theme-ease: cubic-bezier(0.22, 1, 0.36, 1);
        --theme-fade-duration: 360ms;
        --theme-fade-dark: rgba(4, 8, 20, 0.52);
        --theme-fade-light: rgba(242, 248, 255, 0.34);
        --toggle-knob-a: #ffe8bc;
        --toggle-knob-b: #f2a35f;
        --toggle-knob-glow: rgba(255, 191, 118, 0.55);
        --toggle-knob-crater: rgba(66, 86, 143, 0.35);
        --thinking-panel-inner: rgba(6, 10, 22, 0.5);
        --thinking-content-bg: rgba(255, 255, 255, 0.03);
        --thinking-content-border: rgba(146, 173, 255, 0.24);
      }

      body.theme-light {
        --bg-1: #f5f7ff;
        --bg-2: #edf2ff;
        --bg-3: #dfe8ff;
        --bg-accent-1: rgba(116, 154, 255, 0.28);
        --bg-accent-2: rgba(147, 178, 255, 0.24);
        --grid-line: rgba(50, 86, 168, 0.08);
        --grid-opacity: 0.45;
        --panel: rgba(255, 255, 255, 0.86);
        --panel-border: rgba(104, 132, 211, 0.34);
        --console-shadow: 0 14px 34px rgba(67, 94, 160, 0.24);
        --text-main: #1c263d;
        --text-muted: #55658f;
        --ring-1-bright: rgba(255, 212, 161, 0.44);
        --ring-1-mid: rgba(255, 196, 133, 0.31);
        --ring-1-fade: rgba(255, 179, 122, 0.08);
        --ring-2-bright: rgba(255, 202, 149, 0.36);
        --ring-2-mid: rgba(255, 183, 121, 0.25);
        --ring-2-fade: rgba(255, 164, 105, 0.07);
        --ring-3-bright: rgba(255, 193, 138, 0.31);
        --ring-3-mid: rgba(255, 175, 112, 0.21);
        --ring-3-fade: rgba(255, 153, 94, 0.06);
        --ring-4-bright: rgba(255, 186, 128, 0.26);
        --ring-4-mid: rgba(255, 168, 104, 0.18);
        --ring-4-fade: rgba(255, 144, 84, 0.05);
        --user-msg: linear-gradient(145deg, rgba(150, 178, 255, 0.46), rgba(103, 136, 226, 0.42));
        --assistant-msg: linear-gradient(145deg, rgba(238, 244, 255, 0.92), rgba(224, 234, 255, 0.9));
        --msg-border: rgba(117, 144, 219, 0.35);
        --input-bg: rgba(250, 252, 255, 0.96);
        --input-border: rgba(112, 142, 224, 0.42);
        --placeholder: #6a7daa;
        --source-text: #2f457c;
        --source-border: rgba(112, 142, 224, 0.4);
        --source-bg: rgba(208, 224, 255, 0.62);
        --form-border: rgba(112, 142, 224, 0.28);
        --status-color: #8f5a2d;
        --status-shadow: rgba(255, 179, 101, 0.48);
        --button-a: #e5995f;
        --button-b: #c76a4f;
        --button-text: #fff8f2;
        --button-shadow: 0 8px 18px rgba(206, 120, 72, 0.34);
        --toggle-bg: rgba(255, 255, 255, 0.86);
        --toggle-border: rgba(112, 142, 224, 0.4);
        --toggle-text: #314b85;
        --toggle-shadow: 0 8px 20px rgba(88, 117, 186, 0.2);
        --toggle-knob-a: #f2f7ff;
        --toggle-knob-b: #b9ccff;
        --toggle-knob-glow: rgba(126, 156, 236, 0.45);
        --toggle-knob-crater: rgba(83, 109, 184, 0.36);
        --thinking-panel-inner: rgba(246, 251, 255, 0.92);
        --thinking-content-bg: rgba(212, 227, 255, 0.62);
        --thinking-content-border: rgba(112, 142, 224, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(980px 620px at 50% 28%, var(--bg-accent-1), transparent 70%),
          radial-gradient(760px 500px at 8% 10%, var(--bg-accent-2), transparent 76%),
          linear-gradient(170deg, var(--bg-1) 0%, var(--bg-2) 60%, var(--bg-3) 100%);
        overflow: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 42px 42px;
        mask-image: radial-gradient(circle at center, black 24%, transparent 88%);
        pointer-events: none;
        opacity: var(--grid-opacity);
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 28;
        pointer-events: none;
        background: transparent;
        opacity: 0;
      }

      body.theme-fading.to-light::after {
        background: var(--theme-fade-dark);
        animation: themeCurtain var(--theme-fade-duration) var(--theme-ease) forwards;
      }

      body.theme-fading.to-dark::after {
        background: var(--theme-fade-light);
        animation: themeCurtain var(--theme-fade-duration) var(--theme-ease) forwards;
      }

      body.theme-ready,
      body.theme-ready::before,
      body.theme-ready .console,
      body.theme-ready .msg,
      body.theme-ready .source-pill,
      body.theme-ready form,
      body.theme-ready #message-input,
      body.theme-ready #send-btn,
      body.theme-ready .status,
      body.theme-ready .ring,
      body.theme-ready .theme-toggle,
      body.theme-ready .theme-toggle-icon,
      body.theme-ready .theme-toggle-icon::after,
      body.theme-ready .theme-toggle-label {
        transition:
          color var(--theme-speed) var(--theme-ease),
          background-color var(--theme-speed) var(--theme-ease),
          background var(--theme-speed) var(--theme-ease),
          border-color var(--theme-speed) var(--theme-ease),
          box-shadow var(--theme-speed) var(--theme-ease),
          text-shadow var(--theme-speed) var(--theme-ease),
          opacity var(--theme-speed) var(--theme-ease),
          filter var(--theme-speed) var(--theme-ease);
      }

      .stage {
        min-height: 100vh;
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 12px;
        padding: 18px clamp(14px, 3vw, 28px) 18px;
      }

      .centerpiece {
        position: relative;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .orb-wrap {
        position: relative;
        width: min(52vw, 300px);
        aspect-ratio: 1;
        display: grid;
        place-items: center;
        isolation: isolate;
      }

      .core {
        width: 44%;
        aspect-ratio: 1;
        position: relative;
        z-index: 8;
        overflow: hidden;
        border-radius: 54% 46% 52% 48% / 47% 53% 49% 51%;
        background:
          radial-gradient(circle at 29% 24%, rgba(255, 229, 193, 0.92) 0%, rgba(255, 204, 154, 0.82) 26%, rgba(255, 162, 116, 0.72) 58%, rgba(238, 114, 84, 0.78) 100%),
          radial-gradient(circle at 74% 76%, rgba(255, 194, 154, 0.26), transparent 64%);
        box-shadow:
          0 0 26px rgba(255, 179, 114, 0.28),
          0 0 76px rgba(255, 141, 88, 0.17),
          inset 0 -16px 26px rgba(102, 46, 30, 0.38),
          inset 0 12px 20px rgba(255, 229, 189, 0.16);
        filter: saturate(1.02) brightness(0.92);
        isolation: isolate;
        transform: translateZ(0);
        backface-visibility: hidden;
        will-change: border-radius, filter, transform;
        animation:
          corePulse 24s cubic-bezier(0.55, 0.08, 0.24, 0.96) infinite,
          coreShape 28s cubic-bezier(0.58, 0.04, 0.24, 0.98) infinite,
          coreLuma 26s cubic-bezier(0.45, 0.08, 0.24, 0.96) infinite;
      }

      .core::before,
      .core::after {
        content: "";
        position: absolute;
        inset: -14%;
        border-radius: inherit;
        pointer-events: none;
        will-change: transform, border-radius, opacity, filter;
      }

      .core::before {
        background:
          radial-gradient(circle at 22% 26%, rgba(255, 240, 213, 0.52), transparent 40%),
          radial-gradient(circle at 74% 72%, rgba(255, 136, 98, 0.36), transparent 56%),
          radial-gradient(circle at 46% 50%, rgba(255, 186, 142, 0.16), transparent 68%);
        mix-blend-mode: normal;
        opacity: 0.58;
        filter: blur(11px) saturate(1.04);
        animation: coreFlowA 15s linear infinite;
      }

      .core::after {
        background:
          radial-gradient(circle at 66% 28%, rgba(255, 219, 180, 0.34), transparent 44%),
          radial-gradient(circle at 30% 80%, rgba(255, 120, 86, 0.28), transparent 58%);
        mix-blend-mode: normal;
        opacity: 0.52;
        filter: blur(14px) saturate(1.03);
        animation: coreFlowB 19s linear infinite;
      }

      .ring {
        position: absolute;
        width: var(--ring-size, 62%);
        aspect-ratio: 1;
        z-index: var(--ring-depth, 1);
        border-radius: 50%;
        border: 0;
        background:
          radial-gradient(circle at 32% 28%, rgba(255, 247, 228, 0.12), transparent 45%),
          radial-gradient(circle at 50% 50%, var(--ring-bright) 0%, var(--ring-mid) 58%, var(--ring-fade) 100%);
        box-shadow:
          0 0 28px rgba(255, 174, 108, 0.12),
          inset 0 0 22px rgba(255, 170, 113, 0.08);
        opacity: var(--ring-alpha, 0.28);
        transform: scale(0.94, 1.03);
        transform-origin: 50% 50%;
        will-change: transform, border-radius, opacity;
        animation:
          waveBreath var(--ring-breath, 26s) cubic-bezier(0.56, 0.08, 0.24, 0.96) infinite,
          waveMorph var(--ring-morph, 24s) cubic-bezier(0.54, 0.06, 0.24, 0.98) infinite,
          waveDrift var(--ring-drift, 32s) linear infinite;
      }

      .ring.r1 {
        --ring-size: 62%;
        --ring-depth: 6;
        --ring-bright: var(--ring-1-bright);
        --ring-mid: var(--ring-1-mid);
        --ring-fade: var(--ring-1-fade);
        --ring-alpha: 0.42;
        --ring-breath: 22s;
        --ring-morph: 20s;
        --ring-drift: 27s;
        animation-delay: -2s, -0.6s, -4s;
      }

      .ring.r2 {
        --ring-size: 72%;
        --ring-depth: 5;
        --ring-bright: var(--ring-2-bright);
        --ring-mid: var(--ring-2-mid);
        --ring-fade: var(--ring-2-fade);
        --ring-alpha: 0.33;
        --ring-breath: 25s;
        --ring-morph: 23s;
        --ring-drift: 31s;
        animation-delay: -9s, -6s, -12s;
      }

      .ring.r3 {
        --ring-size: 82%;
        --ring-depth: 4;
        --ring-bright: var(--ring-3-bright);
        --ring-mid: var(--ring-3-mid);
        --ring-fade: var(--ring-3-fade);
        --ring-alpha: 0.27;
        --ring-breath: 28s;
        --ring-morph: 26s;
        --ring-drift: 35s;
        animation-delay: -15s, -11s, -18s;
      }

      .ring.r4 {
        --ring-size: 92%;
        --ring-depth: 3;
        --ring-bright: var(--ring-4-bright);
        --ring-mid: var(--ring-4-mid);
        --ring-fade: var(--ring-4-fade);
        --ring-alpha: 0.22;
        --ring-breath: 32s;
        --ring-morph: 30s;
        --ring-drift: 39s;
        animation-delay: -20s, -15s, -23s;
      }

      .status {
        position: absolute;
        z-index: 10;
        bottom: 10%;
        font-size: clamp(13px, 1.7vw, 15px);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--status-color);
        text-align: center;
        text-shadow: 0 0 18px var(--status-shadow);
      }

      .chat-shell {
        --thinking-reserve: 0px;
        width: min(980px, calc(100% - var(--thinking-reserve)));
        margin: 0 auto;
        transition:
          width 320ms var(--theme-ease),
          margin-left 320ms var(--theme-ease),
          margin-right 320ms var(--theme-ease);
      }

      body.thinking-mode .chat-shell {
        --thinking-reserve: clamp(348px, 47vw, 620px);
        margin-left: 0;
        margin-right: calc(var(--thinking-reserve) - 16px);
      }

      .console {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        backdrop-filter: blur(12px);
        box-shadow: var(--console-shadow);
        overflow: hidden;
      }

      #messages {
        height: min(34vh, 340px);
        overflow-y: auto;
        padding: 14px;
        scrollbar-color: rgba(149, 177, 255, 0.42) transparent;
      }

      .thinking-panel {
        position: fixed;
        top: 74px;
        right: clamp(8px, 1.6vw, 16px);
        bottom: 14px;
        width: min(44vw, 560px);
        min-width: 320px;
        z-index: 45;
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        box-shadow: var(--console-shadow);
        backdrop-filter: blur(12px);
        background: var(--panel);
        overflow: hidden;
        transform: translateX(102%);
        opacity: 0;
        pointer-events: none;
        transition:
          transform 320ms var(--theme-ease),
          opacity 280ms var(--theme-ease);
      }

      .thinking-panel-inner {
        background: var(--thinking-panel-inner);
        height: 100%;
        padding: 10px;
        overflow-y: auto;
      }

      body.thinking-mode .thinking-panel {
        transform: translateX(0);
        opacity: 1;
        pointer-events: auto;
      }

      .thinking-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 8px;
      }

      .thinking-close {
        border: 1px solid var(--input-border);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text-main);
        font-size: 11px;
        padding: 4px 8px;
        cursor: pointer;
      }

      .thinking-subhead {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin: 8px 0 4px;
      }

      .thinking-stage {
        border: 1px solid var(--thinking-content-border);
        border-radius: 10px;
        padding: 8px;
        margin-top: 8px;
        background: rgba(255, 255, 255, 0.02);
      }

      .thinking-stage-title {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-main);
      }

      .thinking-stage-title .thinking-stage-meta {
        color: var(--text-muted);
        margin-left: 6px;
      }

      .thinking-content {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        line-height: 1.35;
        color: var(--text-main);
        background: var(--thinking-content-bg);
        border: 1px solid var(--thinking-content-border);
        border-radius: 8px;
        padding: 8px;
        min-height: 56px;
      }

      .trace-links {
        display: block;
      }

      .trace-links .source-card {
        margin-top: 0;
      }

      .trace-links .source-pill {
        margin: 6px 6px 0 0;
      }

      .msg {
        margin: 0 0 12px;
        max-width: 84%;
        border-radius: 14px;
        padding: 11px 12px;
        line-height: 1.45;
        white-space: normal;
        border: 1px solid var(--msg-border);
      }

      .msg-body strong {
        font-weight: 700;
      }

      .msg-body .inline-code {
        font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 0.92em;
        border: 1px solid var(--thinking-content-border);
        background: var(--thinking-content-bg);
        border-radius: 6px;
        padding: 1px 5px;
      }

      .msg-body .md-code-block {
        margin: 8px 0 0;
        border: 1px solid var(--thinking-content-border);
        background: var(--thinking-content-bg);
        border-radius: 8px;
        padding: 8px 10px;
        overflow-x: auto;
      }

      .msg-body .md-code-block code {
        font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre;
      }

      .msg-body .md-code-lang {
        margin-top: 8px;
        margin-bottom: -2px;
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .msg-body .md-paragraph {
        margin: 0 0 8px;
        white-space: pre-wrap;
      }

      .msg-body .md-paragraph:last-child {
        margin-bottom: 0;
      }

      .msg-body .md-list,
      .msg-body .md-olist {
        margin: 6px 0 8px 18px;
        padding-left: 14px;
      }

      .msg-body .md-list li,
      .msg-body .md-olist li {
        margin: 3px 0;
      }

      .msg-body .md-spacer {
        height: 7px;
      }

      .msg.user {
        margin-left: auto;
        background: var(--user-msg);
      }

      .msg.assistant {
        margin-right: auto;
        background: var(--assistant-msg);
      }

      .msg-meta {
        margin-top: 8px;
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .sources {
        margin-top: 9px;
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .source-card {
        flex: 1 1 100%;
        border: 1px solid var(--source-border);
        background: var(--source-bg);
        border-radius: 10px;
        padding: 6px 8px;
      }

      .source-pill {
        display: inline-flex;
        align-items: center;
        max-width: 100%;
        text-decoration: none;
        color: var(--source-text);
        font-size: 12px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid var(--source-border);
        background: transparent;
      }

      .source-why {
        margin-top: 6px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .source-evidence {
        margin-top: 5px;
        padding: 6px 8px;
        border-left: 2px solid var(--source-border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--source-text);
        font-size: 12px;
        line-height: 1.35;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 11px;
        border-top: 1px solid var(--form-border);
      }

      .form-actions {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        flex-wrap: wrap;
        gap: 8px;
      }

      .thinking-toggle-floating {
        position: fixed;
        z-index: 30;
        top: 14px;
        right: clamp(114px, 10.5vw, 162px);
        display: inline-flex;
        align-items: center;
        gap: 9px;
        min-width: 94px;
        border: 1px solid var(--toggle-border);
        border-radius: 999px;
        background: var(--toggle-bg);
        color: var(--toggle-text);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1;
        padding: 6px 10px 6px 7px;
        cursor: pointer;
        box-shadow: var(--toggle-shadow);
        backdrop-filter: blur(8px);
        transform: translateY(0);
      }

      .thinking-toggle-floating:hover {
        transform: translateY(-1px);
      }

      .thinking-toggle-floating:active {
        transform: translateY(0) scale(0.98);
      }

      .thinking-toggle-icon {
        position: relative;
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        border-radius: 50%;
        border: 1.4px solid currentColor;
        background: transparent;

        content: "";

        border-radius: 50%;

        opacity: 0.45;

        content: "";
        position: absolute;
        inset: -3px;
        border-radius: 50%;

      #context-mode-select {

      #send-btn {

      #reset-btn {

      #send-btn:disabled,
      #context-mode-select:disabled,
      #reset-btn:disabled,
      #thinking-toggle:disabled {

      .theme-toggle {
        position: fixed;
        z-index: 30;
        top: 14px;
        right: clamp(10px, 2.6vw, 22px);

        align-items: center;

      .theme-toggle:hover {
        transform: translateY(-1px);

      .theme-toggle:active {
        transform: translateY(0) scale(0.98);
      }

      .theme-toggle-icon {
        position: relative;
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, var(--toggle-knob-a) 0%, var(--toggle-knob-b) 70%);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.24),
          0 0 14px var(--toggle-knob-glow);

      .theme-toggle-icon::after {

        position: absolute;
        top: 4px;

      .theme-toggle-label {

      body.theme-light .theme-toggle-icon {

      body.theme-light .theme-toggle-icon::after {

      body.theme-light .theme-toggle-label {

      body.theme-ready .theme-toggle {
        transition:
          transform 220ms var(--theme-ease),
          color var(--theme-speed) var(--theme-ease),
          background-color var(--theme-speed) var(--theme-ease),
          background var(--theme-speed) var(--theme-ease),
          border-color var(--theme-speed) var(--theme-ease),
          box-shadow var(--theme-speed) var(--theme-ease);

      body.theme-ready .theme-toggle-icon {
        transition:
          transform 380ms var(--theme-ease),
          background var(--theme-speed) var(--theme-ease),
          box-shadow var(--theme-speed) var(--theme-ease);
      }

      body.theme-ready .theme-toggle-icon::after {
        transition:
          opacity 320ms var(--theme-ease),
          transform 380ms var(--theme-ease),
          background-color var(--theme-speed) var(--theme-ease),
          background var(--theme-speed) var(--theme-ease);
      }

      body.theme-ready .theme-toggle-label {
        transition:
          letter-spacing 280ms var(--theme-ease),
          color var(--theme-speed) var(--theme-ease);
      }

      body.theme-ready .thinking-toggle-floating {
        transition:
          transform 220ms var(--theme-ease),
          color var(--theme-speed) var(--theme-ease),
          background-color var(--theme-speed) var(--theme-ease),
          background var(--theme-speed) var(--theme-ease),
          border-color var(--theme-speed) var(--theme-ease),
          box-shadow var(--theme-speed) var(--theme-ease);
      }

      body.theme-ready .thinking-toggle-icon {
        transition:
          transform 380ms var(--theme-ease),
          background var(--theme-speed) var(--theme-ease),
          box-shadow var(--theme-speed) var(--theme-ease);
      }

      body.theme-ready .thinking-toggle-icon::before,
      body.theme-ready .thinking-toggle-icon::after {
        transition:
          opacity var(--theme-speed) var(--theme-ease),
          border-color var(--theme-speed) var(--theme-ease),
          background-color var(--theme-speed) var(--theme-ease);
      }

      @media (prefers-reduced-motion: reduce) {
        body.theme-ready,

        body.theme-ready .console,

        body.theme-ready form,
        body.theme-ready #message-input,

        body.theme-ready .ring,
        body.theme-ready .theme-toggle,
        body.theme-ready .theme-toggle-icon,
        body.theme-ready .theme-toggle-icon::after,
        body.theme-ready .theme-toggle-label,
        body.theme-ready .thinking-toggle-floating,
        body.theme-ready .thinking-toggle-icon,

        body.theme-ready .thinking-toggle-icon::after,
        body.theme-ready .thinking-toggle-label {
          transition: none !important;
        }

        body.theme-fading::after {

          opacity: 0 !important;
        }

        .theme-toggle,
        .theme-toggle:hover,
        .theme-toggle:active {
          transform: none;

      }

      @keyframes waveMorph {

      @media (max-width: 740px) {

  <body>
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme">
      <span class="theme-toggle-icon" aria-hidden="true"></span>
      <span class="theme-toggle-label" id="theme-toggle-label">Light</span>
    </button>
    <button id="thinking-toggle" class="thinking-toggle-floating" type="button" aria-pressed="false" aria-label="Toggle thinking sidebar">
      <span class="thinking-toggle-icon" aria-hidden="true"></span>
      <span id="thinking-toggle-label" class="thinking-toggle-label">Thinking</span>
    </button>
    <div class="stage">
      <section class="centerpiece" aria-label="TA Visualizer">
        <div class="orb-wrap" id="orb-wrap">
          <div class="ring r1"></div>
          <div class="ring r2"></div>
          <div class="ring r3"></div>
          <div class="ring r4"></div>
          <div class="core"></div>
          <div class="status" id="status-text">Ready</div>
        </div>
      </section>

      <section class="chat-shell" aria-label="Chat Workspace">
        <div class="console" aria-label="Chat Console">
          <div id="messages"></div>
          <form id="chat-form">
            <input id="message-input" placeholder="Ask schedule, assignments, policy, and section questions" autocomplete="off" />
            <div class="form-actions">
              <select id="context-mode-select" aria-label="LLM context mode">
                <option value="retrieval">Focused</option>
                <option value="section_map">Section Map</option>
                <option value="full">Premium Full</option>
              </select>
              <button id="reset-btn" type="button">New Session</button>
              <button id="send-btn" type="submit">Transmit</button>
            </div>
          </form>
        </div>
      </section>
    </div>
    <aside id="thinking-panel" class="thinking-panel" aria-label="LLM Trace Sidebar">
      <div class="thinking-panel-inner">
        <div class="thinking-head">
          <span>LLM Trace</span>
          <button id="thinking-close" class="thinking-close" type="button">Close</button>
        </div>
        <div class="thinking-stage">
          <div class="thinking-stage-title">Router</div>
          <div class="thinking-subhead">Thinking</div>
          <pre id="router-thinking-view" class="thinking-content">Thinking mode is off.</pre>
          <div class="thinking-subhead">Response</div>
          <pre id="router-response-view" class="thinking-content">No router response captured yet.</pre>
          <div class="thinking-subhead">Sources</div>
          <div id="router-sources-view" class="sources trace-links">No router sources captured yet.</div>

          <div class="thinking-subhead">Sources</div>
          <div id="reader-sources-view" class="sources trace-links">No main-model sources captured yet.</div>
          <div class="thinking-subhead">Response</div>
          <pre id="reader-response-view" class="thinking-content">No main-model response captured yet.</pre>
        </div>

          <div class="thinking-stage-title">Checker</div>

    <script>
      const messagesEl = document.getElementById("messages");
      const formEl = document.getElementById("chat-form");
      const inputEl = document.getElementById("message-input");
      const btnEl = document.getElementById("send-btn");
      const resetBtnEl = document.getElementById("reset-btn");
      const contextModeEl = document.getElementById("context-mode-select");
      const thinkingToggleEl = document.getElementById("thinking-toggle");
      const thinkingToggleLabelEl = document.getElementById("thinking-toggle-label");
      const thinkingCloseEl = document.getElementById("thinking-close");
      const routerThinkingViewEl = document.getElementById("router-thinking-view");
      const routerResponseViewEl = document.getElementById("router-response-view");
      const routerSourcesViewEl = document.getElementById("router-sources-view");
      const readerSourcesViewEl = document.getElementById("reader-sources-view");
      const readerResponseViewEl = document.getElementById("reader-response-view");
      const checkerViewEl = document.getElementById("checker-view");
      const statusEl = document.getElementById("status-text");
      const themeToggleEl = document.getElementById("theme-toggle");
      const themeToggleLabelEl = document.getElementById("theme-toggle-label");
      const THEME_KEY = "tai-theme";
      const SESSION_KEY = "tai-session-id";
      const CONTEXT_MODE_KEY = "tai-context-mode";
      const THINKING_MODE_KEY = "tai-thinking-mode";
      const VALID_CONTEXT_MODES = new Set(["retrieval", "section_map", "full"]);
      const prefersReducedMotion =
        typeof window.matchMedia === "function" && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const TRACE_PREVIEW_LIMITS = Object.freeze({
        short: 170,
        medium: 340,
        long: 640,
        response: 2200
      });
      let themeFadeTimeout = null;

      function createSessionId() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return `session-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 10)}`;
      }

      function getOrCreateSessionId() {
        try {
          const existing = localStorage.getItem(SESSION_KEY);
          if (existing) {
            return existing;
          }
          const generated = createSessionId();
          localStorage.setItem(SESSION_KEY, generated);
          return generated;
        } catch (err) {
          return createSessionId();
        }
      }

      function persistSessionId(sessionId) {
        try {
          localStorage.setItem(SESSION_KEY, sessionId);
        } catch (err) {
          // Ignore storage failures (private mode or blocked storage).
        }
      }

      let sessionId = getOrCreateSessionId();

      function getInitialContextMode() {
        try {
          const stored = localStorage.getItem(CONTEXT_MODE_KEY);
          if (stored && VALID_CONTEXT_MODES.has(stored)) {
            return stored;
          }
        } catch (err) {
          // Ignore storage failures (private mode or blocked storage).
        }
        return "retrieval";
      }

      function getInitialThinkingMode() {
        try {
          return localStorage.getItem(THINKING_MODE_KEY) === "1";
        } catch (err) {
          return false;
        }
      }

      function isThinkingModeEnabled() {
        return document.body.classList.contains("thinking-mode");
      }

      function syncThinkingToggle(enabled) {
        thinkingToggleEl.classList.toggle("active", enabled);
        thinkingToggleEl.setAttribute("aria-pressed", enabled ? "true" : "false");
        thinkingToggleLabelEl.textContent = "Thinking";
      }

      function applyThinkingMode(enabled) {
        document.body.classList.toggle("thinking-mode", enabled);
        syncThinkingToggle(enabled);
        if (!enabled) {
          routerThinkingViewEl.textContent = "Thinking mode is off.";
          routerResponseViewEl.textContent = "No router response captured yet.";
          routerSourcesViewEl.textContent = "No router sources captured yet.";
          readerSourcesViewEl.textContent = "No main-model sources captured yet.";
          readerResponseViewEl.textContent = "No main-model response captured yet.";
          checkerViewEl.textContent = "No checker output captured yet.";
        }
      }

      function getInitialTheme() {
        let storedTheme = null;
        try {
          storedTheme = localStorage.getItem(THEME_KEY);
        } catch (err) {
          storedTheme = null;
        }
        if (storedTheme === "light" || storedTheme === "dark") {
          return storedTheme;
        }
        const prefersLight =
          typeof window.matchMedia === "function" && window.matchMedia("(prefers-color-scheme: light)").matches;
        return prefersLight ? "light" : "dark";
      }

      function applyTheme(theme) {
        const isLight = theme === "light";
        document.body.classList.toggle("theme-light", isLight);
        themeToggleLabelEl.textContent = isLight ? "Dark" : "Light";
        themeToggleEl.setAttribute("aria-pressed", isLight ? "true" : "false");
        themeToggleEl.setAttribute("aria-label", isLight ? "Switch to dark mode" : "Switch to light mode");
      }

      function transitionTheme(nextTheme) {
        if (prefersReducedMotion) {
          applyTheme(nextTheme);
          return;
        }

        if (themeFadeTimeout !== null) {
          window.clearTimeout(themeFadeTimeout);
          themeFadeTimeout = null;
        }

        const directionClass = nextTheme === "light" ? "to-light" : "to-dark";
        document.body.classList.remove("theme-fading", "to-light", "to-dark");
        document.body.classList.add("theme-fading", directionClass);
        applyTheme(nextTheme);

        themeFadeTimeout = window.setTimeout(() => {
          document.body.classList.remove("theme-fading", "to-light", "to-dark");
          themeFadeTimeout = null;
        }, 390);
      }

      let currentTheme = getInitialTheme();
      applyTheme(currentTheme);
      requestAnimationFrame(() => {
        document.body.classList.add("theme-ready");
      });

      themeToggleEl.addEventListener("click", () => {
        currentTheme = currentTheme === "light" ? "dark" : "light";
        transitionTheme(currentTheme);
        try {
          localStorage.setItem(THEME_KEY, currentTheme);
        } catch (err) {
          // Ignore storage failures (private mode or blocked storage).
        }
      });

      contextModeEl.value = getInitialContextMode();
      contextModeEl.addEventListener("change", () => {
        const mode = VALID_CONTEXT_MODES.has(contextModeEl.value) ? contextModeEl.value : "retrieval";
        contextModeEl.value = mode;
        try {
          localStorage.setItem(CONTEXT_MODE_KEY, mode);
        } catch (err) {
          // Ignore storage failures (private mode or blocked storage).
        }
      });

      applyThinkingMode(getInitialThinkingMode());
      thinkingToggleEl.addEventListener("click", () => {
        const enabled = !isThinkingModeEnabled();
        applyThinkingMode(enabled);
        try {
          localStorage.setItem(THINKING_MODE_KEY, enabled ? "1" : "0");
        } catch (err) {
          // Ignore storage failures (private mode or blocked storage).
        }
      });

      function closeThinkingPanel() {
        applyThinkingMode(false);
        try {
          localStorage.setItem(THINKING_MODE_KEY, "0");
        } catch (err) {
          // Ignore storage failures (private mode or blocked storage).
        }
      }

      thinkingCloseEl.addEventListener("click", () => {
        closeThinkingPanel();
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && isThinkingModeEnabled()) {
          closeThinkingPanel();
        }
      });

      function clearNode(node) {
        while (node.firstChild) {
          node.removeChild(node.firstChild);
        }
      }

      function normalizeTraceText(value) {
        return String(value || "").replace(/\s+/g, " ").trim();
      }

      function clipTracePreview(value, maxChars) {
        const text = normalizeTraceText(value);
        if (!text) {
          return "";
        }
        if (text.length <= maxChars) {
          return text;
        }
        if (maxChars <= 3) {
          return text.slice(0, maxChars);
        }
        return text.slice(0, maxChars - 3).trimEnd() + "...";
      }

      function traceLine(label, value, maxChars = TRACE_PREVIEW_LIMITS.medium) {
        const clipped = clipTracePreview(value, maxChars);
        if (!clipped) {
          return "";
        }
        return `${label}: ${clipped}`;
      }

      function formatTraceLines(lines, fallbackText) {
        const cleaned = lines
          .map((line) => String(line || "").trim())
          .filter((line) => line.length > 0);
        if (cleaned.length === 0) {
          return fallbackText;
        }
        return cleaned.join("\n");
      }

      function normalizeTraceLinks(items) {
        if (!Array.isArray(items)) {
          return [];
        }
        const links = [];
        const seenUrls = new Set();
        items.forEach((item, idx) => {
          if (!item || typeof item !== "object") {
            return;
          }
          const url = typeof item.url === "string" ? item.url.trim() : "";
          if (!url || seenUrls.has(url)) {
            return;
          }
          seenUrls.add(url);
          links.push({
            source: item.source || idx + 1,
            title: item.title || item.section || "Source",
            url
          });
        });
        return links;
      }

      function renderTraceSourceList(container, links, emptyText, maxItems = 12) {
        clearNode(container);
        const normalized = normalizeTraceLinks(links);
        if (normalized.length === 0) {
          container.textContent = emptyText;
          return;
        }
        const cappedItems =
          Number.isFinite(maxItems) && maxItems > 0
            ? normalized.slice(0, maxItems)
            : normalized;
        const card = document.createElement("div");
        card.className = "source-card";
        cappedItems.forEach((item, idx) => {
          const a = document.createElement("a");
          a.className = "source-pill";
          a.href = item.url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          const rank = item.source ? `S${item.source}` : `S${idx + 1}`;
          a.textContent = `${rank} ${item.title || "Source"}`;
          card.appendChild(a);
        });
        container.appendChild(card);
      }

      function collectRouterSources(trace) {
        if (!trace || typeof trace !== "object") {
          return [];
        }
        if (Array.isArray(trace.router_to_reader_links) && trace.router_to_reader_links.length > 0) {
          return trace.router_to_reader_links;
        }
        if (Array.isArray(trace.router_selected_sources) && trace.router_selected_sources.length > 0) {
          return trace.router_selected_sources.map((item, idx) => ({
            source: item.source || idx + 1,
            title: item.title || item.section || "Source",
            section: item.section || "",
            url: item.url || ""
          }));
        }
        if (Array.isArray(trace.router_candidate_links) && trace.router_candidate_links.length > 0) {
          return trace.router_candidate_links;
        }
        return [];
      }

      function collectReaderSources(trace) {
        if (!trace || typeof trace !== "object") {
          return [];
        }
        if (Array.isArray(trace.reader_links) && trace.reader_links.length > 0) {
          return trace.reader_links;
        }
        return [];
      }

      function renderLlmTrace(trace) {
        if (!trace || typeof trace !== "object") {
          routerThinkingViewEl.textContent = "No LLM trace was returned for this turn.";
          routerResponseViewEl.textContent = "Router response unavailable for this turn.";
          routerSourcesViewEl.textContent = "No router sources captured for this turn.";
          readerSourcesViewEl.textContent = "No main-model sources captured for this turn.";
          readerResponseViewEl.textContent = "Main-model response unavailable for this turn.";
          checkerViewEl.textContent = "Checker did not run for this turn.";
          return;
        }

        const routerThinkingLines = [];
        const routerThinking = clipTracePreview(trace.router_thinking || trace.router_rationale, TRACE_PREVIEW_LIMITS.response);
        if (routerThinking) {
          routerThinkingLines.push(routerThinking);
        }
        if (trace.context_mode) {
          const modeLine = trace.premium_mode ? `${trace.context_mode} (premium)` : trace.context_mode;
          routerThinkingLines.push(`Context mode: ${modeLine}`);
        }
        if (trace.query_used_for_retrieval) {
          routerThinkingLines.push(
            traceLine("Retrieval query", trace.query_used_for_retrieval, TRACE_PREVIEW_LIMITS.medium)
          );
        }
        routerThinkingViewEl.textContent = formatTraceLines(
          routerThinkingLines,
          "Router thinking unavailable in this mode."
        );

        const routerResponseLines = [];
        const routerResponse = clipTracePreview(trace.router_raw_response, TRACE_PREVIEW_LIMITS.long);
        if (routerResponse) {
          routerResponseLines.push(routerResponse);
        }
        if (trace.router_prompt_preview) {
          routerResponseLines.push(traceLine("Prompt cue", trace.router_prompt_preview, TRACE_PREVIEW_LIMITS.short));
        }
        routerResponseViewEl.textContent = formatTraceLines(
          routerResponseLines,
          "Router response unavailable in this mode."
        );
        renderTraceSourceList(
          routerSourcesViewEl,
          collectRouterSources(trace),
          "No router sources captured for this turn."
        );

        const readerResponseLines = [];
        if (trace.final_answer_mode) {
          readerResponseLines.push(`Answer mode: ${trace.final_answer_mode}`);
        }
        const finalAnswer = clipTracePreview(
          trace.final_answer || trace.raw_response,
          TRACE_PREVIEW_LIMITS.response
        );
        if (finalAnswer) {
          readerResponseLines.push(traceLine("Response", finalAnswer, TRACE_PREVIEW_LIMITS.response));
        }
        if (trace.thinking) {
          readerResponseLines.push(traceLine("Thinking", trace.thinking, TRACE_PREVIEW_LIMITS.long));
        }
        readerResponseViewEl.textContent = formatTraceLines(
          readerResponseLines,
          "Main-model response unavailable for this turn."
        );
        renderTraceSourceList(
          readerSourcesViewEl,
          collectReaderSources(trace),
          "No main-model sources captured for this turn.",
          Number.POSITIVE_INFINITY
        );

        const checkerLines = [];
        if (trace.checker_decision) {
          checkerLines.push(`Request guard: ${trace.checker_decision}`);
        }
        if (trace.checker_reason) {
          checkerLines.push(traceLine("Request reason", trace.checker_reason, TRACE_PREVIEW_LIMITS.long));
        }
        if (Object.prototype.hasOwnProperty.call(trace, "checker_response_contains_code")) {
          checkerLines.push(
            `Response contains code: ${trace.checker_response_contains_code ? "yes" : "no"}`
          );
        }
        if (trace.checker_response_reason) {
          checkerLines.push(
            traceLine("Response scan", trace.checker_response_reason, TRACE_PREVIEW_LIMITS.long)
          );
        }
        if (Array.isArray(trace.checker_response_markers) && trace.checker_response_markers.length > 0) {
          checkerLines.push(`Detected markers: ${trace.checker_response_markers.join(", ")}`);
        }
        if (trace.checker_error) {
          checkerLines.push(traceLine("Checker error", trace.checker_error, TRACE_PREVIEW_LIMITS.medium));
        }
        checkerViewEl.textContent = formatTraceLines(checkerLines, "Checker did not run for this turn.");
      }

      function renderPendingLlmTrace(message, contextMode) {
        const timestamp = new Date().toLocaleTimeString();
        routerThinkingViewEl.textContent = formatTraceLines(
          [
            `Preparing request at ${timestamp}.`,
            traceLine("Question", message, TRACE_PREVIEW_LIMITS.medium),
            `Context mode: ${contextMode}`
          ],
          "Preparing request..."
        );
        routerResponseViewEl.textContent = "Waiting for router response...";
        routerSourcesViewEl.textContent = "Waiting for router sources...";
        readerSourcesViewEl.textContent = "Waiting for main-model sources...";
        readerResponseViewEl.textContent = "Waiting for main-model response...";
        checkerViewEl.textContent = "Waiting for checker output...";
      }

      function setThinking(value) {
        if (value) {
          statusEl.textContent = "Thinking";
        } else if (statusEl.textContent === "Thinking") {
          statusEl.textContent = "Ready";
        }
      }

      function appendInlineMarkdown(container, text) {
        let i = 0;
        let plain = "";
        const flushPlain = () => {
          if (plain) {
            container.appendChild(document.createTextNode(plain));
            plain = "";
          }
        };

        while (i < text.length) {
          if (text.startsWith("**", i)) {
            const end = text.indexOf("**", i + 2);
            if (end !== -1) {
              flushPlain();
              const strong = document.createElement("strong");
              strong.textContent = text.slice(i + 2, end);
              container.appendChild(strong);
              i = end + 2;
              continue;
            }
          }

          if (text.startsWith("'''", i)) {
            const end = text.indexOf("'''", i + 3);
            if (end !== -1) {
              flushPlain();
              const code = document.createElement("code");
              code.className = "inline-code";
              code.textContent = text.slice(i + 3, end);
              container.appendChild(code);
              i = end + 3;
              continue;
            }
          }

          if (text[i] === "`") {
            const end = text.indexOf("`", i + 1);
            if (end !== -1) {
              flushPlain();
              const code = document.createElement("code");
              code.className = "inline-code";
              code.textContent = text.slice(i + 1, end);
              container.appendChild(code);
              i = end + 1;
              continue;
            }
          }

          plain += text[i];
          i += 1;
        }
        flushPlain();
      }

      function renderMarkdownTextSegment(container, rawText) {
        const lines = String(rawText || "").replace(/\r\n/g, "\n").split("\n");
        let activeList = null;
        let hasBlock = false;
        let lastWasSpacer = false;

        const closeList = () => {
          activeList = null;
        };

        lines.forEach((line) => {
          const trimmed = line.trim();
          if (!trimmed) {
            closeList();
            if (hasBlock && !lastWasSpacer) {
              const spacer = document.createElement("div");
              spacer.className = "md-spacer";
              container.appendChild(spacer);
              lastWasSpacer = true;
            }
            return;
          }

          const bulletMatch = line.match(/^\s*[*-]\s+(.+)$/);
          const orderedMatch = line.match(/^\s*(\d+)[.)]\s+(.+)$/);
          if (bulletMatch || orderedMatch) {
            const listType = bulletMatch ? "ul" : "ol";
            const content = bulletMatch ? bulletMatch[1] : orderedMatch[2];
            if (!activeList || activeList.tagName.toLowerCase() !== listType) {
              closeList();
              activeList = document.createElement(listType);
              activeList.className = listType === "ul" ? "md-list" : "md-olist";
              container.appendChild(activeList);
            }
            const li = document.createElement("li");
            appendInlineMarkdown(li, content);
            activeList.appendChild(li);
            hasBlock = true;
            lastWasSpacer = false;
            return;
          }

          closeList();
          const paragraph = document.createElement("div");
          paragraph.className = "md-paragraph";
          appendInlineMarkdown(paragraph, line);
          container.appendChild(paragraph);
          hasBlock = true;
          lastWasSpacer = false;
        });
      }

      function parseFenceHeader(line) {
        return line.match(/^\s*(```|''')\s*([A-Za-z0-9_.+-]*)\s*$/);
      }

      function renderMarkdownLite(container, rawText) {
        const lines = String(rawText || "").replace(/\r\n/g, "\n").split("\n");
        let i = 0;

        while (i < lines.length) {
          const header = parseFenceHeader(lines[i]);
          if (!header) {
            const textLines = [];
            while (i < lines.length && !parseFenceHeader(lines[i])) {
              textLines.push(lines[i]);
              i += 1;
            }
            renderMarkdownTextSegment(container, textLines.join("\n"));
            continue;
          }

          const fence = header[1];
          const lang = (header[2] || "").trim();
          i += 1;

          const codeLines = [];
          while (i < lines.length && !new RegExp("^\\s*" + fence.replace(/'/g, "\\'") + "\\s*$").test(lines[i])) {
            codeLines.push(lines[i]);
            i += 1;
          }
          if (i < lines.length) {
            i += 1;
          }

          if (lang) {
            const langLabel = document.createElement("div");
            langLabel.className = "md-code-lang";
            langLabel.textContent = lang;
            container.appendChild(langLabel);
          }

          const pre = document.createElement("pre");
          pre.className = "md-code-block";
          const code = document.createElement("code");
          code.textContent = codeLines.join("\n").replace(/\s+$/, "");
          pre.appendChild(code);
          container.appendChild(pre);
        }
      }

      function addMessage(text, role, sources, mode, confidence) {
        const msg = document.createElement("article");
        msg.className = "msg " + role;

        const body = document.createElement("div");
        body.className = "msg-body";
        if (role === "assistant") {
          renderMarkdownLite(body, text);
        } else {
          body.textContent = text;
        }
        msg.appendChild(body);

        if (role === "assistant") {
          if (mode) {
            const meta = document.createElement("div");
            meta.className = "msg-meta";
            const conf = typeof confidence === "number" ? ` | confidence ${confidence.toFixed(2)}` : "";
            meta.textContent = `mode ${mode}${conf}`;
            msg.appendChild(meta);
          }

          if (Array.isArray(sources) && sources.length > 0) {
            const src = document.createElement("div");
            src.className = "sources";

            sources.slice(0, 3).forEach((s) => {
              const a = document.createElement("a");
              a.className = "source-pill";
              a.href = s.url || "#";
              a.target = "_blank";
              a.rel = "noopener noreferrer";
              const rank = s.rank ? `S${s.rank}` : "S";
              const title = s.title || "Untitled";
              a.textContent = `${rank} ${title}`;
              const hasWhy = Array.isArray(s.why) && s.why.length > 0;
              const hasEvidence = Array.isArray(s.evidence) && s.evidence.length > 0;

              if (!hasWhy && !hasEvidence) {
                src.appendChild(a);
                return;
              }

              const card = document.createElement("div");
              card.className = "source-card";
              card.appendChild(a);

              if (hasWhy) {
                const why = document.createElement("div");
                why.className = "source-why";
                why.textContent = s.why.slice(0, 2).join(" ");
                card.appendChild(why);
              }

              if (hasEvidence) {
                const evidence = document.createElement("div");
                evidence.className = "source-evidence";
                evidence.textContent = s.evidence[0];
                card.appendChild(evidence);
              }

              src.appendChild(card);
            });

            msg.appendChild(src);
          }
        }

        messagesEl.appendChild(msg);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function addReadyMessage() {
        addMessage(
          "TAI Assistant online. Ask me anything about CSE 121 and I will search the indexed course sources.",
          "assistant",
          [],
          "ready"
        );
      }

      async function sendMessage(message) {
        btnEl.disabled = true;
        resetBtnEl.disabled = true;
        contextModeEl.disabled = true;
        thinkingToggleEl.disabled = true;
        setThinking(true);
        const contextMode = VALID_CONTEXT_MODES.has(contextModeEl.value) ? contextModeEl.value : "retrieval";
        const thinkingMode = isThinkingModeEnabled();
        if (thinkingMode) {
          renderPendingLlmTrace(message, contextMode);
        }

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message,
              session_id: sessionId,
              context_mode: contextMode,
              thinking_mode: thinkingMode
            })
          });

          const data = await res.json();
          if (!res.ok) {
            addMessage(data.error || "Request failed", "assistant", [], "error");
            statusEl.textContent = "Request failed";
            if (thinkingMode) {
              renderLlmTrace({
                prompt: "Request failed before a valid LLM trace could be returned.",
                thinking: data.error || "No additional server detail available."
              });
            }
            return;
          }

          addMessage(
            data.answer || "(no answer)",
            "assistant",
            data.sources || [],
            data.answer_mode || "unknown",
            typeof data.confidence === "number" ? data.confidence : null
          );
          if (thinkingMode) {
            renderLlmTrace(data.llm_trace || null);
          }
          statusEl.textContent = data.answer_mode === "no_answer" ? "No answer found" : "Answer ready";
        } catch (err) {
          addMessage("Server connection failed.", "assistant", [], "error");
          statusEl.textContent = "Offline";
          if (thinkingMode) {
            renderLlmTrace({
              prompt: "Network/server error while requesting LLM output.",
              thinking: "Connection failed before response."
            });
          }
        } finally {
          btnEl.disabled = false;
          resetBtnEl.disabled = false;
          contextModeEl.disabled = false;
          thinkingToggleEl.disabled = false;
          setThinking(false);
        }
      }

      resetBtnEl.addEventListener("click", async () => {
        if (btnEl.disabled) {
          return;
        }

        const previousSessionId = sessionId;
        sessionId = createSessionId();
        persistSessionId(sessionId);

        messagesEl.textContent = "";
        addReadyMessage();
        statusEl.textContent = "Resetting session";
        resetBtnEl.disabled = true;

        try {
          await fetch("/api/session/reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ session_id: previousSessionId })
          });
          statusEl.textContent = "Ready";
        } catch (err) {
          statusEl.textContent = "Ready";
        } finally {
          resetBtnEl.disabled = false;
          inputEl.focus();
        }
      });

      formEl.addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = inputEl.value.trim();
        if (!message) return;
        addMessage(message, "user");
        inputEl.value = "";
        await sendMessage(message);
      });

      addReadyMessage();
    </script>
  </body>
</html>
